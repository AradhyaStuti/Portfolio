<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c10"/>
      <stop offset="100%" style="stop-color:#111318"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="1198" height="298" rx="12" fill="none" stroke="#1c2030" stroke-width="1"/>

  <!-- Decorative grid dots -->
  <g fill="#1c2030" opacity="0.5">
    <circle cx="50" cy="50" r="1.5"/>
    <circle cx="100" cy="50" r="1.5"/>
    <circle cx="150" cy="50" r="1.5"/>
    <circle cx="200" cy="50" r="1.5"/>
    <circle cx="250" cy="50" r="1.5"/>
    <circle cx="50" cy="100" r="1.5"/>
    <circle cx="100" cy="100" r="1.5"/>
    <circle cx="150" cy="100" r="1.5"/>
    <circle cx="200" cy="100" r="1.5"/>
    <circle cx="250" cy="100" r="1.5"/>
    <circle cx="50" cy="150" r="1.5"/>
    <circle cx="100" cy="150" r="1.5"/>
    <circle cx="150" cy="150" r="1.5"/>
    <circle cx="200" cy="150" r="1.5"/>
    <circle cx="250" cy="150" r="1.5"/>
    <circle cx="50" cy="200" r="1.5"/>
    <circle cx="100" cy="200" r="1.5"/>
    <circle cx="150" cy="200" r="1.5"/>
    <circle cx="200" cy="200" r="1.5"/>
    <circle cx="250" cy="200" r="1.5"/>
    <circle cx="50" cy="250" r="1.5"/>
    <circle cx="100" cy="250" r="1.5"/>
    <circle cx="150" cy="250" r="1.5"/>
    <circle cx="200" cy="250" r="1.5"/>
    <circle cx="250" cy="250" r="1.5"/>
    <circle cx="950" cy="50" r="1.5"/>
    <circle cx="1000" cy="50" r="1.5"/>
    <circle cx="1050" cy="50" r="1.5"/>
    <circle cx="1100" cy="50" r="1.5"/>
    <circle cx="1150" cy="50" r="1.5"/>
    <circle cx="950" cy="100" r="1.5"/>
    <circle cx="1000" cy="100" r="1.5"/>
    <circle cx="1050" cy="100" r="1.5"/>
    <circle cx="1100" cy="100" r="1.5"/>
    <circle cx="1150" cy="100" r="1.5"/>
    <circle cx="950" cy="150" r="1.5"/>
    <circle cx="1000" cy="150" r="1.5"/>
    <circle cx="1050" cy="150" r="1.5"/>
    <circle cx="1100" cy="150" r="1.5"/>
    <circle cx="1150" cy="150" r="1.5"/>
    <circle cx="950" cy="200" r="1.5"/>
    <circle cx="1000" cy="200" r="1.5"/>
    <circle cx="1050" cy="200" r="1.5"/>
    <circle cx="1100" cy="200" r="1.5"/>
    <circle cx="1150" cy="200" r="1.5"/>
    <circle cx="950" cy="250" r="1.5"/>
    <circle cx="1000" cy="250" r="1.5"/>
    <circle cx="1050" cy="250" r="1.5"/>
    <circle cx="1100" cy="250" r="1.5"/>
    <circle cx="1150" cy="250" r="1.5"/>
  </g>

  <!-- Glow effect -->
  <ellipse cx="600" cy="150" rx="350" ry="120" fill="url(#glow)"/>

  <!-- Accent line -->
  <rect x="510" y="100" width="180" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Name -->
  <text x="600" y="145" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#e4e4e7" letter-spacing="-1">
    Aradhya Stuti
  </text>

  <!-- Role -->
  <text x="600" y="180" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#14b8a6" letter-spacing="3">
    DATA SCIENTIST &amp; FULL STACK DEVELOPER
  </text>

  <!-- Bottom accent line -->
  <rect x="510" y="200" width="180" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Tech tags -->
  <g font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">
    <rect x="335" y="225" width="65" height="24" rx="12" fill="#14b8a6" fill-opacity="0.1" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="367" y="241" text-anchor="middle" fill="#14b8a6">React</text>

    <rect x="415" y="225" width="75" height="24" rx="12" fill="#14b8a6" fill-opacity="0.1" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="452" y="241" text-anchor="middle" fill="#14b8a6">Node.js</text>

    <rect x="505" y="225" width="75" height="24" rx="12" fill="#14b8a6" fill-opacity="0.1" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="542" y="241" text-anchor="middle" fill="#14b8a6">PyTorch</text>

    <rect x="595" y="225" width="95" height="24" rx="12" fill="#14b8a6" fill-opacity="0.1" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="642" y="241" text-anchor="middle" fill="#14b8a6">LangChain</text>

    <rect x="705" y="225" width="80" height="24" rx="12" fill="#14b8a6" fill-opacity="0.1" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="745" y="241" text-anchor="middle" fill="#14b8a6">Express</text>

    <rect x="800" y="225" width="70" height="24" rx="12" fill="#14b8a6" fill-opacity="0.1" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="835" y="241" text-anchor="middle" fill="#14b8a6">Docker</text>
  </g>
</svg>
